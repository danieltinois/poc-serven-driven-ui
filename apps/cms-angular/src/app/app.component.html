<main class="shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">POC Server Driven UI</p>
      <h1>CMS Angular</h1>
    </div>
    <button type="button" class="ghost-button" (click)="loadScreen()">Recarregar API</button>
  </header>

  <section class="workspace">
    <article class="panel editor-panel">
      <div class="panel-header">
        <div>
          <h2>Editor de blocos</h2>
          <p class="panel-caption">Monte a tela sem editar JSON manualmente.</p>
        </div>
        <div class="actions">
          <button type="button" class="secondary-button" (click)="validateBlocks()">Validar tela</button>
          <button type="button" class="primary-button" (click)="publish()">Publicar</button>
        </div>
      </div>

      <div class="block-editor" *ngIf="screen() as currentScreen">
        <section class="screen-fields">
          <label>
            <span>Screen</span>
            <input
              type="text"
              [value]="currentScreen.screen"
              (input)="updateScreenField('screen', $event)"
            />
          </label>

          <label>
            <span>Version</span>
            <input
              type="text"
              [value]="currentScreen.version"
              (input)="updateScreenField('version', $event)"
            />
          </label>
        </section>

        <section class="add-block">
          <label>
            <span>Novo bloco</span>
            <select [value]="selectedBlockType()" (change)="setSelectedBlockType($event)">
              <option *ngFor="let type of blockTypes" [value]="type">{{ type }}</option>
            </select>
          </label>
          <button type="button" class="primary-button" (click)="addBlock()">Adicionar</button>
        </section>

        <section class="block-list" (dragend)="clearDragState()">
          <article
            class="block-card"
            *ngFor="let block of currentScreen.blocks; let index = index"
            [class.block-card-dragging]="draggedBlockIndex() === index"
            [class.block-card-drop-target]="dragOverBlockIndex() === index && draggedBlockIndex() !== index"
            (dragover)="enterBlockDropZone(index, $event)"
            (drop)="dropBlock(index, $event)"
          >
            <header class="block-card-header">
              <div class="block-title-row">
                <span
                  class="drag-handle"
                  draggable="true"
                  title="Arrastar bloco"
                  aria-label="Arrastar bloco"
                  (dragstart)="startBlockDrag(index, $event)"
                >☰</span>
                <span class="block-type-chip">{{ block.type }}</span>
              </div>
              <div class="block-heading">
                <p class="block-index">Bloco {{ index + 1 }}</p>
                <h3>{{ block.type }}</h3>
              </div>
              <div class="block-actions">
                <button type="button" class="danger-button" (click)="removeBlock(index)">Remover</button>
              </div>
            </header>

            <div class="block-fields" [ngSwitch]="block.type">
              <ng-container *ngSwitchCase="'hero'">
                <label>
                  <span>Titulo</span>
                  <input
                    type="text"
                    [value]="blockProps(block)['title'] ?? ''"
                    (input)="updateBlockProp(index, 'title', $event)"
                  />
                </label>
                <label>
                  <span>Subtitulo</span>
                  <input
                    type="text"
                    [value]="blockProps(block)['subtitle'] ?? ''"
                    (input)="updateBlockProp(index, 'subtitle', $event)"
                  />
                </label>
              </ng-container>

              <ng-container *ngSwitchCase="'text'">
                <label>
                  <span>Conteudo</span>
                  <textarea
                    [value]="blockProps(block)['content'] ?? ''"
                    (input)="updateBlockProp(index, 'content', $event)"
                  ></textarea>
                </label>
                <label>
                  <span>Variante</span>
                  <select
                    [value]="blockProps(block)['variant'] ?? 'default'"
                    (change)="updateBlockProp(index, 'variant', $event)"
                  >
                    <option value="default">default</option>
                    <option value="link">link</option>
                  </select>
                </label>
                <label *ngIf="blockProps(block)['variant'] === 'link'">
                  <span>Href</span>
                  <input
                    type="url"
                    [value]="blockProps(block)['href'] ?? ''"
                    (input)="updateBlockProp(index, 'href', $event)"
                  />
                </label>
              </ng-container>

              <ng-container *ngSwitchCase="'card'">
                <label>
                  <span>Titulo</span>
                  <input
                    type="text"
                    [value]="blockProps(block)['title'] ?? ''"
                    (input)="updateBlockProp(index, 'title', $event)"
                  />
                </label>
                <label>
                  <span>Descricao</span>
                  <textarea
                    [value]="blockProps(block)['description'] ?? ''"
                    (input)="updateBlockProp(index, 'description', $event)"
                  ></textarea>
                </label>
              </ng-container>

              <ng-container *ngSwitchCase="'button'">
                <label>
                  <span>Label</span>
                  <input
                    type="text"
                    [value]="blockProps(block)['label'] ?? ''"
                    (input)="updateBlockProp(index, 'label', $event)"
                  />
                </label>
                <label>
                  <span>Variante</span>
                  <select
                    [value]="blockProps(block)['variant'] ?? 'primary'"
                    (change)="updateBlockProp(index, 'variant', $event)"
                  >
                    <option value="primary">primary</option>
                    <option value="secondary">secondary</option>
                  </select>
                </label>
                <label>
                  <span>Target</span>
                  <input
                    type="text"
                    [value]="buttonActionTarget(block)"
                    (input)="updateButtonActionTarget(index, $event)"
                  />
                </label>
              </ng-container>

              <ng-container *ngSwitchCase="'video'">
                <label>
                  <span>YouTube URL</span>
                  <input
                    type="url"
                    [value]="blockProps(block)['videoUrl'] ?? ''"
                    (input)="updateBlockProp(index, 'videoUrl', $event)"
                  />
                </label>
                <label>
                  <span>Descricao</span>
                  <textarea
                    [value]="blockProps(block)['content'] ?? ''"
                    (input)="updateBlockProp(index, 'content', $event)"
                  ></textarea>
                </label>
              </ng-container>
            </div>
          </article>
        </section>
      </div>

      <p class="status" [class.status-error]="isError()">{{ status() }}</p>
    </article>

    <article class="panel preview-panel">
      <div class="panel-header">
        <div>
          <h2>Preview Angular</h2>
          <p class="panel-caption">Renderização web usando o mesmo contrato.</p>
        </div>
        <span class="badge">Widgets web próprios</span>
      </div>

      <div class="phone-preview">
        <poc-dynamic-screen-renderer
          *ngIf="screen() as currentScreen"
          [blocks]="currentScreen.blocks"
        />
      </div>
    </article>
  </section>
</main>
