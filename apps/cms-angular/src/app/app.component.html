<main class="shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">POC Server Driven UI</p>
      <h1>CMS Angular</h1>
    </div>
    <button type="button" class="ghost-button" (click)="loadScreen()">Recarregar API</button>
  </header>

  <section class="workspace">
    <article class="panel editor-panel">
      <div class="panel-header">
        <div>
          <h2>Editor de blocos</h2>
          <p class="panel-caption">Monte a tela sem editar JSON manualmente.</p>
        </div>
        <div class="actions">
          <button type="button" class="secondary-button" (click)="validateBlocks()">Validar tela</button>
          <button type="button" class="primary-button" (click)="publish()">Publicar</button>
        </div>
      </div>

      <div class="block-editor" *ngIf="screen() as currentScreen">
        <section class="screen-fields">
          <label>
            <span>Screen</span>
            <input
              type="text"
              [value]="currentScreen.screen"
              (input)="updateScreenField('screen', $event)"
            />
          </label>

          <label>
            <span>Version</span>
            <input
              type="text"
              [value]="currentScreen.version"
              (input)="updateScreenField('version', $event)"
            />
          </label>
        </section>

        <section class="add-block">
          <label>
            <span>Novo bloco</span>
            <select [value]="selectedBlockType()" (change)="setSelectedBlockType($event)">
              <option *ngFor="let block of blockCatalog" [value]="block.type">
                {{ block.label }}
              </option>
            </select>
          </label>
          <button type="button" class="primary-button" (click)="addBlock()">Adicionar</button>
        </section>

        <section class="block-list" (dragend)="clearDragState()">
          <article
            class="block-card"
            *ngFor="let block of currentScreen.blocks; let index = index"
            [class.block-card-dragging]="draggedBlockIndex() === index"
            [class.block-card-drop-target]="dragOverBlockIndex() === index && draggedBlockIndex() !== index"
            (dragover)="enterBlockDropZone(index, $event)"
            (drop)="dropBlock(index, $event)"
          >
            <header class="block-card-header">
              <div class="block-title-row">
                <span
                  class="drag-handle"
                  draggable="true"
                  title="Arrastar bloco"
                  aria-label="Arrastar bloco"
                  (dragstart)="startBlockDrag(index, $event)"
                >☰</span>
                <span class="block-type-chip">{{ blockLabel(block) }}</span>
              </div>
              <div class="block-heading">
                <p class="block-index">Bloco {{ index + 1 }}</p>
                <h3>{{ blockDescription(block) }}</h3>
              </div>
              <div class="block-actions">
                <button type="button" class="danger-button" (click)="removeBlock(index)">Remover</button>
              </div>
            </header>

            <div class="block-fields">
              <label *ngFor="let field of fieldsFor(block)">
                <span>{{ field.label }}</span>

                <textarea
                  *ngIf="field.kind === 'textarea'"
                  [value]="fieldValue(block, field)"
                  (input)="updateBlockField(index, field, $event)"
                ></textarea>

                <select
                  *ngIf="field.kind === 'select'"
                  [value]="fieldValue(block, field)"
                  (change)="updateBlockField(index, field, $event)"
                >
                  <option *ngFor="let option of field.options" [value]="option">
                    {{ option }}
                  </option>
                </select>

                <input
                  *ngIf="field.kind === 'text' || field.kind === 'url'"
                  [type]="field.kind === 'url' ? 'url' : 'text'"
                  [value]="fieldValue(block, field)"
                  (input)="updateBlockField(index, field, $event)"
                />
              </label>
            </div>
          </article>
        </section>
      </div>

      <p class="status" [class.status-error]="isError()">{{ status() }}</p>
    </article>

    <article class="panel preview-panel">
      <div class="panel-header">
        <div>
          <h2>Preview Angular</h2>
          <p class="panel-caption">Renderização web usando o mesmo contrato.</p>
        </div>
        <span class="badge">Widgets web próprios</span>
      </div>

      <div class="phone-preview">
        <poc-dynamic-screen-renderer
          *ngIf="screen() as currentScreen"
          [blocks]="currentScreen.blocks"
        />
      </div>
    </article>
  </section>
</main>
